log_level = "warn"
outputs = "All"
position = "Top"

[modules]
left = [ [ "appLauncher", "Workspaces" ] ]
center = [ "Clock" ]
right = [ "SystemInfo", "Updates" ]

[updates]
check_cmd = "checkupdates; paru -Qua"
update_cmd = 'kitty -e bash -c "paru; echo Done - Press enter to exit; read" &'

[workspaces]
visibility_mode = "All"
enable_workspace_filling = true

[window_title]
truncate_title_after_length = 100

[system_info]
indicators = [ "Cpu", "Memory", "Temperature", "DownloadSpeed", "UploadSpeed"]

[system_info.cpu]
warn_threshold = 60
alert_threshold = 80

[system_info.memory]
warn_threshold = 70
alert_threshold = 85

[system_info.disk]
warn_threshold = 80
alert_threshold = 90

[system_info.temperature]
warn_threshold = 60
alert_threshold = 80
sensor = "coretemp Package id 0"

[clock]
format = "%a %d %B %I:%M %p"

[appearance]
font_name = "Playpen Sans Regular"
opacity = 1.0
style = "Solid"

primary_color = "#33ccff"
success_color = "#9ece6a"
text_color = "#a9b1d6"

workspace_colors = [ "#33ccff", "#9ece6a" ]

[appearance.danger_color]
base = "#b00020"
weak = "#e0af68"

[appearance.background_color]
base = "#1a1b26"
weak = "#24273a"
strong = "#414868"

[appearance.secondary_color]
base = "#0c0d14"
