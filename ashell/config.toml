log_level = "warn"
outputs = "All"
position = "Top"
# app_launcher_cmd = "hyprlauncher"
clipboard_cmd = "cliphist-rofi-img | wl-copy"

[modules]
left = [ [ "appLauncher", "Workspaces" ] ]
center = [ "Clock" ]
# right = [ "Updates", "SystemInfo", [  "Tray", "Privacy", "Settings" ] ]
right = [ "SystemInfo" ]

# [updates]
# check_cmd = "checkupdates; paru -Qua"
# update_cmd = 'kitty -e bash -c "paru; echo Done - Press enter to exit; read" &'

[workspaces]
enable_workspace_filling = true

# [[CustomModule]]
# name = "appLauncher"
# icon = "󱗼"
# command = "hyprlauncher"

[window_title]
truncate_title_after_length = 100

[system_info]
indicators = [ "Cpu", "Memory", "Temperature", "DownloadSpeed", "UploadSpeed"]

[system_info.cpu]
warn_threshold = 60
alert_threshold = 80

[system_info.memory]
warn_threshold = 70
alert_threshold = 85

[system_info.disk]
warn_threshold = 80
alert_threshold = 90

[system_info.temperature]
warn_threshold = 60
alert_threshold = 80
sensor = "acpitz temp1"

[clock]
format = "%a %d %B %I:%M %p"

# [settings]
# lock_cmd = "playerctl --all-players pause; nixGL hyprlock &"
# audio_sinks_more_cmd = "pavucontrol -t 3"
# audio_sources_more_cmd = "pavucontrol -t 4"
# wifi_more_cmd = "nm-connection-editor"
# vpn_more_cmd = "nm-connection-editor"
# bluetooth_more_cmd = "blueberry"

[appearance]
font_name = "Open Sans Regular"
opacity = 0.8

# primary_color = "#7aa2f7"
primary_color = "#33ccff"
success_color = "#9ece6a"
text_color = "#a9b1d6"

workspace_colors = [ "#33ccff", "#9ece6a" ]

[appearance.danger_color]
base = "#f7768e"
weak = "#e0af68"

[appearance.background_color]
base = "#1a1b26"
weak = "#24273a"
strong = "#414868"

[appearance.secondary_color]
base = "#0c0d14"
